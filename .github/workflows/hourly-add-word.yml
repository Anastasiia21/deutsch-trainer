name: Hourly add verb

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  add_daily_word:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run hourly verb script
        run: python hourly_add_word.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add public/verbs.json new_verbs.txt
            git commit -m "Hourly add verb"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
            echo "No commit was created because there was no new importable verb or fallback A1/A2 verb to add." >> "$GITHUB_STEP_SUMMARY"
          fi